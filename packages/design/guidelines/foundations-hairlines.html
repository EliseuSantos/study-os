<!-- @dsCard group="Foundations" viewport="700x190" name="Hairlines, não caixas" subtitle="Lists divide by hairline; only the 'next' item gets a raised card + rail" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);height:190px;padding:16px 22px;box-sizing:border-box}</style></head>
<body>
<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px 12px 16px;position:relative;overflow:hidden">
  <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)"></span>
  <span style="font-family:var(--font-display);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)">Próximo</span>
  <div style="font-family:var(--font-body);font-size:17px;color:var(--text-hi);margin-top:5px">12 cards · Dir. Constitucional</div>
</div>
<div style="display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--hairline)">
  <span style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></span>
  <span style="flex:1;font-family:var(--font-body);font-size:15px;color:var(--text-body)">8 cards · Redação</span>
  <span style="font-family:var(--font-display);font-size:12px;color:var(--text-low)">≈ 5 min</span>
</div>
<div style="display:flex;align-items:center;gap:14px;padding:13px 4px">
  <span style="width:8px;height:8px;border:1.5px solid var(--text-low);border-radius:2px;background:transparent"></span>
  <span style="flex:1;font-family:var(--font-body);font-size:15px;color:var(--text-body)">Ler acórdão anexado</span>
  <span style="font-family:var(--font-display);font-size:12px;color:var(--text-low)">lembrete</span>
</div>
</body></html>
