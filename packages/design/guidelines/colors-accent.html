<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-display);height:170px;display:flex;align-items:center;gap:12px;padding:0 20px;box-sizing:border-box}
.sw{border-radius:var(--radius);height:118px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;box-sizing:border-box}
.n{font-size:12px;font-weight:600}.v{font-size:10px;letter-spacing:.04em;opacity:.8;margin-top:2px}</style></head>
<body>
<div class="sw" style="flex:1.4;background:var(--accent);color:var(--accent-ink)"><span class="n">--accent</span><span class="v">#E9A94F · oklch(.80 .13 78)</span></div>
<div class="sw" style="flex:1;background:var(--accent-tint-12);border:1px solid var(--accent);color:var(--accent)"><span class="n">--accent-tint-12</span><span class="v">seleção · 12%</span></div>
<div class="sw" style="flex:1;background:var(--accent-tint-08);border:1px solid var(--border);color:var(--text-mid)"><span class="n">--accent-tint-08</span><span class="v">linha ativa · 8%</span></div>
<div class="sw" style="flex:1;background:var(--success);color:#191712"><span class="n">--success</span><span class="v">#86A17C · done</span></div>
</body></html>
