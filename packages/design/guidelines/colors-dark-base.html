<!-- @dsCard group="Colors" viewport="700x150" name="Dark base" subtitle="Near-black quente — bg, surfaces, hairlines" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-display);display:grid;grid-template-columns:repeat(5,1fr);height:150px}
.sw{display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.n{font-size:12px;font-weight:600}.v{font-size:10px;letter-spacing:.04em;opacity:.75;margin-top:2px}</style></head>
<body>
<div class="sw" style="background:#191712;color:#F1ECE3"><span class="n">--bg</span><span class="v">#191712</span></div>
<div class="sw" style="background:#141210;color:#F1ECE3"><span class="n">--bg-deep</span><span class="v">#141210</span></div>
<div class="sw" style="background:#221F19;color:#F1ECE3"><span class="n">--surface</span><span class="v">#221F19</span></div>
<div class="sw" style="background:#2B2721;color:#F1ECE3"><span class="n">--hairline</span><span class="v">#2B2721</span></div>
<div class="sw" style="background:#3D3830;color:#F1ECE3"><span class="n">--border</span><span class="v">#3D3830</span></div>
</body></html>
