services:
  study-os:
    build:
      context: ..
      dockerfile: .pve/Dockerfile
    container_name: study-os
    ports:
      - '8787:8787'
    environment:
      # optional: set in .pve/.env to enable the youtube/web sources
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    volumes:
      - study-os-state:/app/apps/worker/.wrangler
    restart: unless-stopped

volumes:
  study-os-state:
