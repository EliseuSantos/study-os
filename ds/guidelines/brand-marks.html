<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);height:170px;display:flex;align-items:center;gap:30px;padding:0 26px;box-sizing:border-box;font-family:var(--font-display)}
.it{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.l{font-size:10px;color:var(--text-low);line-height:1.4}</style></head>
<body>
<div class="it"><span style="width:11px;height:11px;border-radius:50%;background:var(--success)"></span><span class="l">dominado</span></div>
<div class="it"><span style="width:11px;height:11px;border-radius:50%;border:2px solid var(--accent);box-sizing:border-box"></span><span class="l">estudando</span></div>
<div class="it"><span style="width:11px;height:11px;border-radius:50%;border:1.5px solid var(--text-low);box-sizing:border-box"></span><span class="l">pendente</span></div>
<div class="it"><span style="width:10px;height:10px;border-radius:2px;background:var(--success)"></span><span class="l">bloco / rotina<br>(quadrado)</span></div>
<div class="it"><span style="width:0;height:0;border-left:14px solid var(--accent);border-top:9px solid transparent;border-bottom:9px solid transparent"></span><span class="l">play · CSS</span></div>
<div class="it"><span style="width:20px;height:20px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);font-size:13px;font-weight:700">✓</span><span class="l">check</span></div>
<div class="it"><span style="color:var(--border);font-size:16px;letter-spacing:2px">⠿</span><span class="l">arrastar</span></div>
<div class="it"><span style="color:var(--text-low);font-size:14px">▾ ▸ → ·</span><span class="l">unicode</span></div>
<div class="it"><span style="width:7px;height:7px;border-radius:50%;background:var(--text-low)"></span><span class="l">offline dot</span></div>
</body></html>
