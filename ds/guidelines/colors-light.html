<!-- @dsCard group="Colors" viewport="700x160" name="Light theme" subtitle="Papel quente — mesmos tokens, uso diurno" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-display);display:grid;grid-template-columns:repeat(5,1fr);height:160px}
.sw{display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.n{font-size:12px;font-weight:600}.v{font-size:10px;letter-spacing:.04em;opacity:.75;margin-top:2px}</style></head>
<body data-theme="light">
<div class="sw" style="background:#F6F2EA;color:#22201B"><span class="n">--bg</span><span class="v">#F6F2EA · papel</span></div>
<div class="sw" style="background:#FFFFFF;color:#22201B;border:1px solid #E2DACB;box-sizing:border-box"><span class="n">--surface</span><span class="v">#FFFFFF</span></div>
<div class="sw" style="background:#E2DACB;color:#22201B"><span class="n">--hairline</span><span class="v">#E2DACB</span></div>
<div class="sw" style="background:#C98A2E;color:#FFF7EA"><span class="n">--accent</span><span class="v">#C98A2E · AA sobre claro</span></div>
<div class="sw" style="background:#7C9773;color:#FFF"><span class="n">--success</span><span class="v">#7C9773</span></div>
</body></html>
