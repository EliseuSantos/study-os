<!-- @dsCard group="Foundations" viewport="700x150" name="Radius" subtitle="8px único · 4px micro · pills only for chips" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);height:150px;display:flex;align-items:center;gap:26px;padding:0 26px;box-sizing:border-box;font-family:var(--font-display)}
.it{display:flex;flex-direction:column;align-items:center;gap:8px}
.l{font-size:11px;color:var(--text-low)}</style></head>
<body>
<div class="it"><div style="width:48px;height:48px;background:var(--accent);border-radius:8px"></div><span class="l">8px · único</span></div>
<div class="it"><div style="width:48px;height:48px;background:var(--surface);border:1px solid var(--border);border-radius:4px"></div><span class="l">4px · micro</span></div>
<div class="it"><div style="width:48px;height:48px;background:var(--surface);border:1px solid var(--border);border-radius:6px"></div><span class="l">6px · pill interno</span></div>
<div class="it"><div style="width:84px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:16px"></div><span class="l">16px · chip</span></div>
<div class="it"><div style="width:64px;height:48px;background:var(--surface);border:1px solid var(--border-device);border-radius:14px"></div><span class="l">14px · janela</span></div>
<div class="it"><div style="width:48px;height:64px;background:var(--surface);border:1px solid var(--border-device);border-radius:20px"></div><span class="l">44px · phone</span></div>
</body></html>
