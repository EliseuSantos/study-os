<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-display);display:flex;flex-direction:column;justify-content:center;gap:7px;height:150px;padding:0 24px;box-sizing:border-box}
.r{display:flex;align-items:baseline;gap:14px;font-size:14px}
.t{width:110px;font-size:11px;letter-spacing:.06em;color:var(--text-low)}</style></head>
<body>
<div class="r"><span class="t">--text-hi</span><span style="color:var(--text-hi)">Boa noite, Ana — títulos e números #F1ECE3</span></div>
<div class="r"><span class="t">--text-body</span><span style="color:var(--text-body)">Itens de lista #E7E1D6</span></div>
<div class="r"><span class="t">--text-mid</span><span style="color:var(--text-mid)">Secundário #B2AA9E</span></div>
<div class="r"><span class="t">--text-soft</span><span style="color:var(--text-soft)">Desenfatizado #9A9285</span></div>
<div class="r"><span class="t">--text-low</span><span style="color:var(--text-low)">Metadados · labels #7B756A</span></div>
</body></html>
