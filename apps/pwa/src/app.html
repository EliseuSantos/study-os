<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#191712" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="%sveltekit.assets%/fonts/SpaceGrotesk-latin.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="%sveltekit.assets%/fonts/Literata-latin.woff2"
    />
    <script>
      // dark is the default (no attribute); apply light before paint to avoid a flash
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch {
        /* storage unavailable — keep default theme */
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
